<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG迁移</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
            background: #f0f2f5;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            font-size: 22px;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .wallet-status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        .wallet-status .address {
            font-size: 14px;
            color: #333;
            word-break: break-all;
        }
        .wallet-status .badge {
            background: #27ae60;
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        .info-card {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 12px;
        }
        .info-card .label {
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }
        .info-card .value {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
        }
        .info-card .value.small {
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 16px;
        }
        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 6px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border 0.2s;
        }
        .input-group input:focus {
            border-color: #3498db;
        }
        .btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #3498db;
            color: white;
        }
        .btn-primary:hover {
            background: #2980b9;
        }
        .btn-primary:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }
        .btn-success {
            background: #27ae60;
            color: white;
        }
        .btn-success:hover {
            background: #219a52;
        }
        .btn-success:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }
        .status-msg {
            margin-top: 12px;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            display: none;
        }
        .status-msg.success {
            display: block;
            background: #e8f8f0;
            color: #27ae60;
            border: 1px solid #b2dfdb;
        }
        .status-msg.error {
            display: block;
            background: #fde8e8;
            color: #c0392b;
            border: 1px solid #f5c6cb;
        }
        .status-msg.info {
            display: block;
            background: #e8f4fd;
            color: #2980b9;
            border: 1px solid #b8d4e3;
        }
        .footer {
            text-align: center;
            margin-top: 16px;
            color: #999;
            font-size: 12px;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #eee;
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            background: #3498db;
            border-radius: 3px;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 MG迁移</h1>
        <p class="subtitle">一键迁移您的旧代币及推荐关系</p>

        <div class="wallet-status" id="walletStatus">
            <span class="address" id="walletAddress">未连接</span>
            <span class="badge" id="networkBadge">BSC</span>
        </div>

        <div class="info-grid">
            <div class="info-card">
                <div class="label">旧代币余额</div>
                <div class="value" id="oldBalance">--</div>
            </div>
            <div class="info-card">
                <div class="label">可迁移剩余库存</div>
                <div class="value" id="remainingCap">--</div>
            </div>
            <div class="info-card">
                <div class="label">新代币余额</div>
                <div class="value" id="newBalance">--</div>
            </div>
            <div class="info-card">
                <div class="label">推荐人</div>
                <div class="value small" id="referrerInfo">--</div>
            </div>
        </div>

        <div style="margin-bottom: 12px;">
            <div style="display: flex; justify-content: space-between; font-size: 13px; color: #666;">
                <span>已提取: <span id="usedAmount">0</span></span>
                <span>初始总量: <span id="totalInit">1200000.0000</span></span>
            </div>
            <div class="progress-bar">
                <div class="fill" id="migrateProgress" style="width: 0%;"></div>
            </div>
        </div>

        <div class="input-group">
            <label>迁移数量（留空迁移全部）</label>
            <input type="text" id="amountInput" placeholder="例如：1000">
        </div>

        <button class="btn btn-primary" id="connectBtn">连接钱包</button>
        <button class="btn btn-success" id="migrateBtn" style="margin-top: 10px;" disabled>一键迁移</button>

        <div class="status-msg" id="statusMsg"></div>

        <div class="footer">
            支持 MetaMask / TP 钱包 | BSC 主网
        </div>
    </div>

    <script src="https://unpkg.com/ethers@5.7.2/dist/ethers.umd.min.js"></script>

    <script>
        // 合约地址
        const CONFIG = {
            oldToken: '0xa3d66e5ec25362c4e7b7f1bc0e9b0598b136b6cd',
            mgTokenV2: '0x661150e0D8Bd7D6dF8F14a3b27890bcD64162a8D',
            externalDistributor: '0xF1dDdbf0BF0e0cefaBF708A2ED05aD9f55AB4cf8'
        };
        const BSC_CHAIN_ID = 56;
        const DECIMALS = 18;
        // 迁移池初始总量 1200000
        const INIT_TOTAL = ethers.utils.parseEther("1200000");

        // 仅保留合约真实存在的方法
        const oldTokenABI = [
            'function superior(address user) view returns (address)',
            'function balanceOf(address owner) view returns (uint256)',
            'function approve(address spender, uint256 amount) returns (bool)'
        ];

        const mgTokenV2ABI = [
            'function migrate(uint256 amount) external',
            'function balanceOf(address owner) view returns (uint256)'
        ];

        const externalDistributorABI = [
            'function binded(address user) view returns (bool)',
            'function directReferrer(address user) view returns (address)'
        ];

        let signer = null, userAddress = null, provider = null;
        let oldTokenContract = null, mgTokenV2Contract = null, externalDistributorContract = null;

        // DOM 节点
        const connectBtn = document.getElementById('connectBtn');
        const migrateBtn = document.getElementById('migrateBtn');
        const walletAddress = document.getElementById('walletAddress');
        const oldBalanceEl = document.getElementById('oldBalance');
        const remainingCapEl = document.getElementById('remainingCap');
        const newBalanceEl = document.getElementById('newBalance');
        const referrerInfoEl = document.getElementById('referrerInfo');
        const usedAmountEl = document.getElementById('usedAmount');
        const totalInitEl = document.getElementById('totalInit');
        const migrateProgressEl = document.getElementById('migrateProgress');
        const statusMsg = document.getElementById('statusMsg');
        const amountInput = document.getElementById('amountInput');

        // 消息提示
        function showStatus(msg, type = 'info') {
            statusMsg.textContent = msg;
            statusMsg.className = 'status-msg ' + type;
        }
        function hideStatus() {
            statusMsg.className = 'status-msg';
        }

        // 数值格式化 保留4位小数
        function formatNum(wei) {
            return parseFloat(ethers.utils.formatUnits(wei, DECIMALS)).toFixed(4);
        }

        // 切换BSC主网
        async function switchBSC() {
            try {
                await window.ethereum.request({
                    method: "wallet_switchEthereumChain",
                    params: [{ chainId: ethers.utils.hexValue(BSC_CHAIN_ID) }]
                });
            } catch (e) {
                if (e.code === 4902) {
                    await window.ethereum.request({
                        method: "wallet_addEthereumChain",
                        params: [{
                            chainId: ethers.utils.hexValue(BSC_CHAIN_ID),
                            chainName: "Binance Smart Chain",
                            rpcUrls: ["https://bsc-dataseed1.binance.org/"],
                            blockExplorerUrls: ["https://bscscan.com/"],
                            nativeCurrency: { name: "BNB", symbol: "BNB", decimals: 18 }
                        }]
                    });
                } else {
                    throw e;
                }
            }
        }

        // 重置页面
        function resetPage() {
            signer = userAddress = provider = null;
            oldTokenContract = mgTokenV2Contract = externalDistributorContract = null;
            walletAddress.textContent = "未连接";
            connectBtn.textContent = "连接钱包";
            connectBtn.disabled = false;
            migrateBtn.disabled = true;
            oldBalanceEl.textContent = "--";
            remainingCapEl.textContent = "--";
            newBalanceEl.textContent = "--";
            referrerInfoEl.textContent = "--";
            usedAmountEl.textContent = "0";
            migrateProgressEl.style.width = "0%";
            hideStatus();
        }

        // 连接钱包
        async function connectWallet() {
            try {
                if (!window.ethereum) {
                    showStatus('未检测到钱包，请使用 MetaMask / TP 钱包打开', 'error');
                    return;
                }
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                await switchBSC();

                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                userAddress = await signer.getAddress();

                oldTokenContract = new ethers.Contract(CONFIG.oldToken, oldTokenABI, signer);
                mgTokenV2Contract = new ethers.Contract(CONFIG.mgTokenV2, mgTokenV2ABI, signer);
                externalDistributorContract = new ethers.Contract(CONFIG.externalDistributor, externalDistributorABI, signer);

                walletAddress.textContent = userAddress.slice(0, 6) + '...' + userAddress.slice(-4);
                connectBtn.textContent = '已连接';
                connectBtn.disabled = true;
                migrateBtn.disabled = false;

                await refreshData();
                showStatus('钱包连接成功，数据已加载', 'success');
            } catch (err) {
                console.error(err);
                showStatus('连接失败：' + err.message.slice(0, 40), 'error');
                resetPage();
            }
        }

        // 刷新数据（核心：读取新合约余额作为剩余可迁移库存）
        async function refreshData() {
            if (!signer || !userAddress) return;
            try {
                // 1. 用户旧代币余额
                const oldBal = await oldTokenContract.balanceOf(userAddress);
                oldBalanceEl.textContent = formatNum(oldBal) + ' OLD';

                // 2. 用户新代币余额
                const newBal = await mgTokenV2Contract.balanceOf(userAddress);
                newBalanceEl.textContent = formatNum(newBal) + ' MGT';

                // 3. 新合约自身余额 = 剩余可迁移库存（按你要求）
                const poolRemain = await mgTokenV2Contract.balanceOf(CONFIG.mgTokenV2);
                remainingCapEl.textContent = formatNum(poolRemain) + ' 库存';

                // 4. 已提取数量 = 初始总量 - 当前合约库存
                const used = INIT_TOTAL.sub(poolRemain);
                usedAmountEl.textContent = formatNum(used);
                totalInitEl.textContent = formatNum(INIT_TOTAL);

                // 5. 进度条：已提取占初始总量比例
                const progress = used.mul(10000).div(INIT_TOTAL).toNumber() / 100;
                migrateProgressEl.style.width = progress + '%';

                // 6. 推荐人信息
                let refText = "无推荐人";
                const isBinded = await externalDistributorContract.binded(userAddress);
                if (isBinded) {
                    const directRef = await externalDistributorContract.directReferrer(userAddress);
                    if (directRef !== ethers.constants.AddressZero) {
                        refText = directRef.slice(0,6) + '...' + directRef.slice(-4);
                    }
                } else {
                    const oldRef = await oldTokenContract.superior(userAddress);
                    refText = oldRef !== ethers.constants.AddressZero ? "待自动绑定(" + oldRef.slice(0,6) + "...)" : "暂无上级";
                }
                referrerInfoEl.textContent = refText;

            } catch (err) {
                console.error('数据读取异常:', err);
                showStatus('链上数据读取失败', 'error');
            }
        }

        // 迁移逻辑
        async function migrate() {
            if (!signer) return;
            hideStatus();
            migrateBtn.disabled = true;
            migrateBtn.textContent = '正在授权...';

            try {
                let inputVal = amountInput.value.trim();
                const oldBal = await oldTokenContract.balanceOf(userAddress);
                const poolRemain = await mgTokenV2Contract.balanceOf(CONFIG.mgTokenV2);
                let amountWei;

                // 解析迁移数量
                if (inputVal === '') {
                    amountWei = oldBal;
                } else {
                    if (isNaN(Number(inputVal))) {
                        showStatus('请输入合法数字', 'error');
                        migrateBtn.disabled = false;
                        migrateBtn.textContent = '一键迁移';
                        return;
                    }
                    amountWei = ethers.utils.parseUnits(inputVal, DECIMALS);
                }

                // 基础校验
                if (amountWei.isZero()) {
                    showStatus('迁移数量不能为0', 'error');
                    migrateBtn.disabled = false;
                    migrateBtn.textContent = '一键迁移';
                    return;
                }
                if (oldBal.lt(amountWei)) {
                    showStatus('旧代币余额不足', 'error');
                    migrateBtn.disabled = false;
                    migrateBtn.textContent = '一键迁移';
                    return;
                }
                // 校验：不能超过合约库存
                if (poolRemain.lt(amountWei)) {
                    showStatus('迁移池库存不足，无法迁移', 'error');
                    migrateBtn.disabled = false;
                    migrateBtn.textContent = '一键迁移';
                    return;
                }

                // 授权旧代币
                const approveTx = await oldTokenContract.approve(CONFIG.mgTokenV2, amountWei);
                await approveTx.wait();
                showStatus('授权成功，执行迁移中...', 'info');

                // 执行迁移
                const migrateTx = await mgTokenV2Contract.migrate(amountWei);
                await migrateTx.wait();

                showStatus('✅ 迁移成功！推荐关系已自动同步', 'success');
                await refreshData();
            } catch (err) {
                console.error(err);
                let errMsg = "迁移失败";
                const rawMsg = err.message || "";

                if (rawMsg.includes("MigrationNotActive")) errMsg = "❌ 迁移功能已关闭";
                else if (rawMsg.includes("user rejected")) errMsg = "❌ 您取消了交易";
                else if (rawMsg.includes("Insufficient contract balance")) errMsg = "❌ 迁移池库存不足";
                else errMsg = "❌ 交易执行失败";

                showStatus(errMsg, 'error');
            } finally {
                migrateBtn.disabled = false;
                migrateBtn.textContent = '一键迁移';
            }
        }

        // 事件监听
        connectBtn.addEventListener('click', connectWallet);
        migrateBtn.addEventListener('click', migrate);

        // 监听钱包切换账号/网络
        if (window.ethereum) {
            window.ethereum.on('accountsChanged', resetPage);
            window.ethereum.on('chainChanged', resetPage);
        }

        // 定时自动刷新数据
        setInterval(() => {
            if (signer) refreshData();
        }, 20000);
    </script>
</body>
</html>
